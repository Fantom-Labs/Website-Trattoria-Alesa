# Netlify: Next.js App Router — plugin wires the server runtime.
#
# Environment variables (Dashboard → your site → Site configuration → Environment variables):
#   - NEXT_PUBLIC_* values are inlined at build time; after changing them, trigger a new deploy
#     ("Clear cache and deploy" if the menu PDF still does not update).
#
# Menu PDF (Google Drive):
#   Key:   NEXT_PUBLIC_MENU_DRIVE_FILE_ID
#   Value: file id only, or full share URL (…/file/d/FILE_ID/…). PDF must be "Anyone with the link" (Viewer).
#
# Optional: NEXT_PUBLIC_WHATSAPP_E164, NEXT_PUBLIC_INSTAGRAM_URL (see .env.example).

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"
